<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>智能提词器 - 编辑页面设计</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      /* 黑白灰核心 + 红色点缀 */
      --bg-primary: #0A0A0A;
      --bg-input: #1A1A1A;
      --bg-input-focus: #222222;
      --bg-button: #2A2A2A;
      --text-primary: #FFFFFF;
      --text-secondary: #888888;
      --text-muted: #555555;
      --text-placeholder: #444444;
      --accent-red: #FF3B30; /* 仅点缀 */
      --border-subtle: rgba(255, 255, 255, 0.08);
      --border-light: rgba(255, 255, 255, 0.15);
      --radius-md: 16px;
      --radius-sm: 8px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: 'Noto Sans SC', -apple-system, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Phone Frame */
    .phone-frame {
      max-width: 390px;
      margin: 20px auto;
      background: var(--bg-primary);
      height: 844px;
      position: relative;
      border-radius: 40px;
      box-shadow:
        0 0 0 12px #1C1C1C,
        0 0 0 14px #2C2C2C,
        0 50px 100px rgba(0, 0, 0, 0.8);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* Status Bar */
    .status-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 28px 10px;
      font-size: 14px;
      font-weight: 500;
      background: linear-gradient(to bottom, rgba(10,10,10,0.9), transparent);
    }

    .status-bar__time {
      font-weight: 600;
    }

    .status-bar__icons {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .status-bar__icons svg {
      width: 18px;
      height: 18px;
    }

    /* Navigation Bar */
    .nav-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px 16px;
      position: relative;
    }

    .nav-bar::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 20px;
      right: 20px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border-subtle) 20%, var(--border-subtle) 80%, transparent);
    }

    .nav-bar__back {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 8px 12px;
      background: transparent;
      border: none;
      color: var(--text-secondary);
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: color 0.2s;
      border-radius: 8px;
    }

    .nav-bar__back svg {
      width: 20px;
      height: 20px;
    }

    .nav-bar__back:active {
      color: var(--text-primary);
      background: rgba(255, 255, 255, 0.05);
    }

    .nav-bar__title {
      font-family: 'Noto Serif SC', serif;
      font-size: 18px;
      font-weight: 600;
      color: var(--text-primary);
    }

    /* 保存按钮 - 无边框 + 红色图标点缀 */
    .nav-bar__save {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 10px 18px;
      background: var(--bg-button);
      border: none;
      border-radius: var(--radius-md);
      color: var(--text-primary);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }

    .nav-bar__save svg {
      width: 16px;
      height: 16px;
      color: var(--accent-red);
    }

    .nav-bar__save:active {
      transform: scale(0.95);
      background: var(--bg-input-focus);
    }

    /* Content Area */
    .editor-content {
      flex: 1;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      overflow: hidden;
    }

    /* Title Input */
    .title-input {
      width: 100%;
      padding: 14px 18px;
      background: var(--bg-input);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md);
      font-family: 'Noto Serif SC', serif;
      font-size: 18px;
      font-weight: 600;
      color: var(--text-primary);
      transition: all 0.2s;
      outline: none;
    }

    .title-input::placeholder {
      color: var(--text-placeholder);
      font-weight: 400;
    }

    .title-input:focus {
      background: var(--bg-input-focus);
      border-color: var(--border-light);
    }

    /* Content Editor */
    .content-editor-wrapper {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
      gap: 12px;
    }

    .content-editor {
      flex: 1;
      width: 100%;
      padding: 18px;
      background: var(--bg-input);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md);
      font-family: 'Noto Sans SC', sans-serif;
      font-size: 16px;
      line-height: 1.8;
      color: var(--text-primary);
      transition: all 0.2s;
      outline: none;
      resize: none;
      overflow-y: auto;
    }

    .content-editor::placeholder {
      color: var(--text-placeholder);
    }

    .content-editor:focus {
      background: var(--bg-input-focus);
      border-color: var(--border-light);
    }

    /* Character Counter - 灰色核心，红色点缀时长 */
    .char-counter {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 16px;
      background: rgba(255, 255, 255, 0.03);
      border-radius: var(--radius-sm);
    }

    .char-counter__count {
      font-size: 13px;
      color: var(--text-muted);
    }

    /* 时长预估 - 红色点缀 */
    .char-counter__estimate {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: var(--text-secondary);
      font-weight: 500;
    }

    .char-counter__estimate::before {
      content: '';
      width: 6px;
      height: 6px;
      background: var(--accent-red);
      border-radius: 50%;
    }

    .char-counter__estimate svg {
      display: none;
    }

    /* Home Indicator */
    .home-indicator {
      position: absolute;
      bottom: 8px;
      left: 50%;
      transform: translateX(-50%);
      width: 134px;
      height: 5px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 3px;
    }

    /* Grain Overlay */
    .grain {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      pointer-events: none;
      opacity: 0.02;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%' height='100%' filter='url(%23noise)'/%3E%3C/svg%3E");
    }
  </style>
</head>
<body>
  <div class="grain"></div>

  <!-- Phone Frame -->
  <div class="phone-frame">
    <!-- Status Bar -->
    <div class="status-bar">
      <span class="status-bar__time">9:41</span>
      <div class="status-bar__icons">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M2 20h.01M7 20v-4M12 20v-8M17 20V8M22 20V4"/>
        </svg>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M5 12.55a11 11 0 0 1 14.08 0M8.53 16.11a6 6 0 0 1 6.95 0M12 20h.01"/>
        </svg>
        <svg viewBox="0 0 24 24" fill="currentColor">
          <rect x="2" y="7" width="18" height="10" rx="2" stroke="currentColor" stroke-width="2" fill="none"/>
          <rect x="20" y="10" width="2" height="4" rx="0.5" fill="currentColor"/>
          <rect x="4" y="9" width="10" height="6" rx="1" fill="currentColor"/>
        </svg>
      </div>
    </div>

    <!-- Navigation Bar -->
    <div class="nav-bar">
      <button class="nav-bar__back">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M19 12H5M12 19l-7-7 7-7"/>
        </svg>
        返回
      </button>
      <span class="nav-bar__title">编辑文稿</span>
      <button class="nav-bar__save">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
          <polyline points="17 21 17 13 7 13 7 21"/>
          <polyline points="7 3 7 8 15 8"/>
        </svg>
        保存
      </button>
    </div>

    <!-- Editor Content -->
    <div class="editor-content">
      <!-- Title Input -->
      <input
        type="text"
        class="title-input"
        placeholder="输入标题..."
        value="产品介绍视频脚本"
      >

      <!-- Content Editor -->
      <div class="content-editor-wrapper">
        <textarea class="content-editor" id="contentEditor" placeholder="在这里输入您的提词内容...">大家好，欢迎来到我们的产品发布会。今天，我要向大家介绍一款革命性的智能设备——它将彻底改变您的视频创作体验。

这款智能提词器应用，能够在您录制视频时，实时显示提词内容，并且通过语音识别技术，自动跟随您的朗读进度，让您再也不用担心忘词或卡壳。

让我们来看看它的三大核心功能：

第一，语音同步滚动。您只需要照着提词器朗读，应用就会自动识别您的语音，将提词内容滚动到您正在朗读的位置。

第二，多种使用模式。您可以选择悬浮窗模式，在任何应用上显示提词器；也可以选择录制模式，直接在应用内完成视频录制。</textarea>

        <!-- Character Counter -->
        <div class="char-counter">
          <span class="char-counter__count" id="charCount">156 字</span>
          <span class="char-counter__estimate" id="timeEstimate">~1 分钟</span>
        </div>
      </div>
    </div>

    <!-- Home Indicator -->
    <div class="home-indicator"></div>
  </div>

  <script>
    const contentEditor = document.getElementById('contentEditor');
    const charCount = document.getElementById('charCount');
    const timeEstimate = document.getElementById('timeEstimate');

    function updateStats() {
      const chars = contentEditor.value.length;
      const minutes = Math.ceil(chars / 200);

      charCount.textContent = `${chars} 字`;
      timeEstimate.textContent = `~${minutes} 分钟`;
    }

    contentEditor.addEventListener('input', updateStats);
    updateStats();
  </script>
</body>
</html>
