<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>智能提词器 - 首页设计</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #0A0A0B;
      --bg-secondary: #131315;
      --bg-card: #1A1A1D;
      --bg-card-hover: #222225;
      --text-primary: #F5F5F7;
      --text-secondary: #A1A1A6;
      --text-muted: #636366;
      --accent-amber: #E8A838;
      --accent-amber-glow: rgba(232, 168, 56, 0.15);
      --accent-red: #FF453A;
      --accent-teal: #32D7A0;
      --border-subtle: rgba(255, 255, 255, 0.06);
      --border-accent: rgba(232, 168, 56, 0.3);
      --shadow-card: 0 4px 24px rgba(0, 0, 0, 0.4);
      --shadow-glow: 0 0 40px rgba(232, 168, 56, 0.1);
      --radius-sm: 8px;
      --radius-md: 16px;
      --radius-lg: 24px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: 'Noto Sans SC', -apple-system, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Phone Frame */
    .phone-frame {
      max-width: 390px;
      margin: 20px auto;
      background: var(--bg-primary);
      min-height: 844px;
      position: relative;
      border-radius: 40px;
      box-shadow:
        0 0 0 12px #1C1C1E,
        0 0 0 14px #2C2C2E,
        0 50px 100px rgba(0, 0, 0, 0.8);
      overflow: hidden;
    }

    /* Status Bar */
    .status-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 28px 10px;
      font-size: 14px;
      font-weight: 500;
      background: linear-gradient(to bottom, rgba(10,10,11,0.9), transparent);
    }

    .status-bar__time {
      font-weight: 600;
    }

    .status-bar__icons {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .status-bar__icons svg {
      width: 18px;
      height: 18px;
    }

    /* Header */
    .header {
      padding: 20px 24px 24px;
      position: relative;
    }

    .header::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 24px;
      right: 24px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border-subtle) 20%, var(--border-subtle) 80%, transparent);
    }

    .header__title {
      font-family: 'Noto Serif SC', serif;
      font-size: 32px;
      font-weight: 700;
      letter-spacing: 2px;
      margin-bottom: 4px;
      background: linear-gradient(135deg, var(--text-primary) 0%, var(--accent-amber) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .header__subtitle {
      font-size: 13px;
      color: var(--text-muted);
      font-weight: 300;
      letter-spacing: 0.5px;
    }

    .header__count {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 16px;
      padding: 6px 12px;
      background: var(--accent-amber-glow);
      border: 1px solid var(--border-accent);
      border-radius: 20px;
      font-size: 12px;
      color: var(--accent-amber);
      font-weight: 500;
    }

    /* Script List */
    .script-list {
      padding: 16px 20px 120px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* Script Card */
    .script-card {
      background: var(--bg-card);
      border-radius: var(--radius-md);
      border: 1px solid var(--border-subtle);
      overflow: hidden;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      animation: cardSlideIn 0.5s ease-out backwards;
    }

    .script-card:nth-child(1) { animation-delay: 0.1s; }
    .script-card:nth-child(2) { animation-delay: 0.2s; }
    .script-card:nth-child(3) { animation-delay: 0.3s; }
    .script-card:nth-child(4) { animation-delay: 0.4s; }

    @keyframes cardSlideIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .script-card:active {
      transform: scale(0.98);
      background: var(--bg-card-hover);
    }

    /* Selected state */
    .script-card.selected {
      border-color: var(--border-accent);
      background: var(--bg-card-hover);
    }

    .script-card.selected .script-card__actions {
      display: flex;
    }

    .script-card__content {
      padding: 20px;
      position: relative;
    }

    .script-card__header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 12px;
    }

    .script-card__title {
      font-family: 'Noto Serif SC', serif;
      font-size: 18px;
      font-weight: 600;
      color: var(--text-primary);
      line-height: 1.4;
      flex: 1;
      margin-right: 12px;
    }

    .script-card__duration {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 4px 10px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      font-size: 11px;
      color: var(--text-secondary);
      white-space: nowrap;
    }

    .script-card__duration svg {
      width: 12px;
      height: 12px;
      opacity: 0.7;
    }

    .script-card__preview {
      font-size: 13px;
      line-height: 1.6;
      color: var(--text-secondary);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      margin-bottom: 16px;
    }

    .script-card__meta {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 11px;
      color: var(--text-muted);
    }

    .script-card__meta-item {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .script-card__meta-item svg {
      width: 12px;
      height: 12px;
      opacity: 0.6;
    }

    /* Action Buttons */
    .script-card__actions {
      display: none;
      border-top: 1px solid var(--border-subtle);
    }

    .script-card__action {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 14px;
      background: transparent;
      border: none;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.2s ease;
      position: relative;
    }

    .script-card__action:not(:last-child)::after {
      content: '';
      position: absolute;
      right: 0;
      top: 20%;
      height: 60%;
      width: 1px;
      background: var(--border-subtle);
    }

    .script-card__action svg {
      width: 18px;
      height: 18px;
      transition: transform 0.2s ease;
    }

    .script-card__action:active {
      background: rgba(255, 255, 255, 0.03);
    }

    .script-card__action--edit:active {
      color: var(--accent-amber);
    }

    .script-card__action--delete:active {
      color: var(--accent-red);
    }

    .script-card__action--record {
      color: var(--accent-teal);
    }

    .script-card__action--record:active {
      color: #28B389;
    }

    .script-card__action--record svg {
      width: 16px;
      height: 16px;
    }

    /* FAB */
    .fab {
      position: absolute;
      bottom: 34px;
      left: 50%;
      transform: translateX(-50%);
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent-amber) 0%, #D4922E 100%);
      border: none;
      box-shadow:
        0 4px 20px rgba(232, 168, 56, 0.4),
        0 0 0 4px rgba(232, 168, 56, 0.1);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      animation: fabPulse 2s ease-in-out infinite;
    }

    @keyframes fabPulse {
      0%, 100% {
        box-shadow:
          0 4px 20px rgba(232, 168, 56, 0.4),
          0 0 0 4px rgba(232, 168, 56, 0.1);
      }
      50% {
        box-shadow:
          0 4px 24px rgba(232, 168, 56, 0.5),
          0 0 0 8px rgba(232, 168, 56, 0.05);
      }
    }

    .fab:active {
      transform: translateX(-50%) scale(0.92);
    }

    .fab svg {
      width: 28px;
      height: 28px;
      color: var(--bg-primary);
    }

    /* Empty State */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 40px;
      text-align: center;
      animation: fadeIn 0.5s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .empty-state__icon {
      width: 80px;
      height: 80px;
      margin-bottom: 20px;
      opacity: 0.3;
      color: var(--text-muted);
    }

    .empty-state__title {
      font-size: 18px;
      font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }

    .empty-state__desc {
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.6;
    }

    /* Home Indicator */
    .home-indicator {
      position: absolute;
      bottom: 8px;
      left: 50%;
      transform: translateX(-50%);
      width: 134px;
      height: 5px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 3px;
    }

    /* Grain Overlay */
    .grain {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      pointer-events: none;
      opacity: 0.015;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%' height='100%' filter='url(%23noise)'/%3E%3C/svg%3E");
    }
  </style>
</head>

  <script>
    // Card selection interaction
    document.querySelectorAll('.script-card').forEach(card => {
      const content = card.querySelector('.script-card__content');

      content.addEventListener('click', function(e) {
        // Deselect all other cards
        document.querySelectorAll('.script-card').forEach(c => c.classList.remove('selected'));

        // Select this card
        card.classList.add('selected');
      });
    });

    // Action button interactions
    document.querySelectorAll('.script-card__action').forEach(btn => {
      btn.addEventListener('click', function(e) {
        e.stopPropagation(); // Prevent card selection toggle

        const action = this.classList.contains('script-card__action--edit') ? 'edit' :
                       this.classList.contains('script-card__action--delete') ? 'delete' : 'record';

        const card = this.closest('.script-card');
        const title = card.querySelector('.script-card__title').textContent;

        if (action === 'edit') {
          alert(`跳转到编辑页面: ${title}`);
        } else if (action === 'delete') {
          alert(`删除文稿: ${title}`);
        } else if (action === 'record') {
          alert(`开始录制: ${title}`);
        }

        // Ripple effect
        const ripple = document.createElement('span');
        ripple.style.cssText = `
          position: absolute;
          background: rgba(255,255,255,0.1);
          border-radius: 50%;
          transform: scale(0);
          animation: ripple 0.4s ease-out;
          pointer-events: none;
        `;
        const rect = this.getBoundingClientRect();
        const size = Math.max(rect.width, rect.height);
        ripple.style.width = ripple.style.height = size + 'px';
        ripple.style.left = (e.clientX - rect.left - size/2) + 'px';
        ripple.style.top = (e.clientY - rect.top - size/2) + 'px';
        this.style.position = 'relative';
        this.style.overflow = 'hidden';
        this.appendChild(ripple);
        setTimeout(() => ripple.remove(), 400);
      });
    });

    // FAB click - go to edit page (new mode)
    document.querySelector('.fab').addEventListener('click', function() {
      alert('跳转到新增文稿页面');
    });

    // Add ripple animation
    const style = document.createElement('style');
    style.textContent = `
      @keyframes ripple {
        to {
          transform: scale(2);
          opacity: 0;
        }
      }
    `;
    document.head.appendChild(style);
  </script>
</body>
</html>
